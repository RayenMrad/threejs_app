<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AR Furniture</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        overflow: hidden;
        background: #000;
      }
      canvas {
        display: block;
      }

      /* AR button that appears when WebXR is ready */
      #ar-button {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        padding: 14px 28px;
        background: rgba(255, 255, 255, 0.9);
        color: #000;
        border: none;
        border-radius: 30px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        z-index: 10;
        display: none; /* hidden until WebXR is ready */
      }

      /* Status message for debugging */
      #status {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        color: white;
        font-size: 13px;
        background: rgba(0, 0, 0, 0.5);
        padding: 6px 14px;
        border-radius: 20px;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="status">Initializing...</div>
    <button id="ar-button">Start AR</button>
    <script type="module" src="/main.js"></script>
  </body>
</html>
